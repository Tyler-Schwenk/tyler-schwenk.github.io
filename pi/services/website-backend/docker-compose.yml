services:
  api:
    build: .
    container_name: website-backend-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/website_backend.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=43200
      - CORS_ORIGINS=${CORS_ORIGINS}
      - API_TITLE=Website Backend API
      - API_VERSION=1.0.0
      # Twilio credentials for trash reminders
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      # Trash reminder config
      - ROOMMATE_PHONES=${ROOMMATE_PHONES}
      - TRASH_REMINDER_HOUR=${TRASH_REMINDER_HOUR:-18}
      - TRASH_TIMEZONE=${TRASH_TIMEZONE:-America/Los_Angeles}
      - TRASH_QUIET_START_HOUR=${TRASH_QUIET_START_HOUR:-22}
      - TRASH_QUIET_END_HOUR=${TRASH_QUIET_END_HOUR:-8}
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./scripts:/app/scripts
      - /media/tyler/FE645A9A645A558D/public-gallery:/app/photos
      - /media/tyler/FE645A9A645A558D/videos:/app/videos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
