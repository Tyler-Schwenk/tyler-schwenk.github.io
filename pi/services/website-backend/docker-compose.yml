services:
  api:
    build: .
    container_name: website-backend-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/website_backend.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=43200
      - CORS_ORIGINS=${CORS_ORIGINS}
      - API_TITLE=Website Backend API
      - API_VERSION=1.0.0
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./scripts:/app/scripts
      - /media/tyler/FE645A9A645A558D/public-gallery:/app/photos
      - /media/tyler/FE645A9A645A558D/videos:/app/videos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
