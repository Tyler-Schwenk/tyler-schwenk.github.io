<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Upload - Tyler Schwenk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .drop-zone {
            border: 3px dashed #d0d0d0;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .drop-zone:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .drop-zone.drag-over {
            border-color: #667eea;
            background: #e8ecff;
        }

        .drop-zone-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .file-input {
            display: none;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-size: 14px;
            color: #333;
        }

        .file-remove {
            background: #ff4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .file-remove:hover {
            background: #cc0000;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 13px;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .login-section {
            display: block;
        }

        .upload-section {
            display: none;
        }

        .logout-btn {
            background: #6c757d;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 10px;
        }

        .user-info {
            background: #e8f5e9;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            width: auto;
        }

        .inline-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .inline-fields {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gallery Upload</h1>
        <p class="subtitle">Upload photos and videos to your website</p>

        <div class="user-info" id="userInfo"></div>

        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <div class="section">
                <div class="section-title">Login Required</div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <div class="message" id="loginMessage"></div>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="upload-section" id="uploadSection">
            <form id="uploadForm">
                <!-- Media Type Selection -->
                <div class="section">
                    <div class="section-title">Upload Type</div>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="uploadType" value="photo" checked>
                            Photos
                        </label>
                        <label>
                            <input type="radio" name="uploadType" value="video">
                            Video
                        </label>
                    </div>
                </div>

                <!-- Photo Upload Fields -->
                <div class="section" id="photoFields">
                    <div class="section-title">Gallery Settings</div>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="galleryMode" value="existing" checked>
                            Existing Gallery
                        </label>
                        <label>
                            <input type="radio" name="galleryMode" value="new">
                            New Gallery
                        </label>
                    </div>

                    <div id="existingGalleryFields" style="margin-top: 15px;">
                        <div class="form-group">
                            <label for="gallery">Select Gallery</label>
                            <select id="gallery">
                                <option value="">Loading galleries...</option>
                            </select>
                        </div>
                    </div>

                    <div id="newGalleryFields" style="display: none; margin-top: 15px;">
                        <div class="form-group">
                            <label for="newGalleryName">Gallery Name *</label>
                            <input type="text" id="newGalleryName" placeholder="Jordan Trip 2026">
                        </div>
                        <div class="form-group">
                            <label for="newGallerySlug">URL Slug * (no spaces, use hyphens)</label>
                            <input type="text" id="newGallerySlug" placeholder="jordan-trip-2026">
                        </div>
                        <div class="form-group">
                            <label for="newGalleryDescription">Description</label>
                            <textarea id="newGalleryDescription" placeholder="Lovely time in Jordan. February 2026"></textarea>
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox" id="newGalleryPublic" checked style="width: auto;">
                                Make gallery public
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Video Upload Fields -->
                <div class="section" id="videoFields" style="display: none;">
                    <div class="section-title">Video Details</div>
                    <div class="form-group">
                        <label for="videoTitle">Title *</label>
                        <input type="text" id="videoTitle" placeholder="My Amazing Video">
                    </div>
                    <div class="form-group">
                        <label for="videoSlug">URL Slug * (no spaces, use hyphens)</label>
                        <input type="text" id="videoSlug" placeholder="my-amazing-video">
                    </div>
                    <div class="form-group">
                        <label for="videoDescription">Description</label>
                        <textarea id="videoDescription" placeholder="Optional description"></textarea>
                    </div>
                </div>

                <!-- File Upload -->
                <div class="section">
                    <div class="section-title">Files</div>
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone-text">Drag and drop files here</div>
                        <div style="color: #999; font-size: 14px;">or click to browse</div>
                    </div>
                    <input type="file" id="fileInput" class="file-input" multiple accept="image/*,video/*">
                    <div class="file-list" id="fileList"></div>
                </div>

                <!-- Upload Button -->
                <button type="submit" id="uploadBtn">Upload</button>

                <!-- Progress -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill">0%</div>
                    </div>
                </div>

                <div class="message" id="uploadMessage"></div>
            </form>

            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.tyler-schwenk.com';
        let authToken = localStorage.getItem('authToken');
        let selectedFiles = [];
        let galleries = [];

        init();

        function init() {
            if (authToken) {
                showUploadSection();
                loadGalleries();
            } else {
                showLoginSection();
            }
            setupEventListeners();
        }

        function setupEventListeners() {
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);

            document.querySelectorAll('input[name="uploadType"]').forEach(radio => {
                radio.addEventListener('change', handleUploadTypeChange);
            });

            document.querySelectorAll('input[name="galleryMode"]').forEach(radio => {
                radio.addEventListener('change', handleGalleryModeChange);
            });

            document.getElementById('newGalleryName').addEventListener('input', (e) => {
                document.getElementById('newGallerySlug').value = e.target.value
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '');
            });

            document.getElementById('videoTitle').addEventListener('input', (e) => {
                document.getElementById('videoSlug').value = e.target.value
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '');
            });

            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileSelect);

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                handleFileSelect({ target: { files: e.dataTransfer.files } });
            });

            document.getElementById('uploadForm').addEventListener('submit', handleUpload);
        }

        function handleUploadTypeChange(e) {
            const isPhoto = e.target.value === 'photo';
            document.getElementById('photoFields').style.display = isPhoto ? 'block' : 'none';
            document.getElementById('videoFields').style.display = isPhoto ? 'none' : 'block';

            const fileInput = document.getElementById('fileInput');
            fileInput.accept = isPhoto ? 'image/*' : 'video/*';
            fileInput.multiple = isPhoto;

            selectedFiles = [];
            renderFileList();
        }

        function handleGalleryModeChange(e) {
            const isExisting = e.target.value === 'existing';
            document.getElementById('existingGalleryFields').style.display = isExisting ? 'block' : 'none';
            document.getElementById('newGalleryFields').style.display = isExisting ? 'none' : 'block';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData,
                });

                if (!response.ok) throw new Error('Login failed');

                const data = await response.json();
                authToken = data.access_token;
                localStorage.setItem('authToken', authToken);

                showMessage('loginMessage', 'Login successful!', 'success');
                setTimeout(() => {
                    showUploadSection();
                    loadGalleries();
                }, 500);
            } catch {
                showMessage('loginMessage', 'Login failed. Check credentials.', 'error');
            }
        }

        function handleLogout() {
            authToken = null;
            localStorage.removeItem('authToken');
            showLoginSection();
        }

        async function loadGalleries() {
            try {
                const response = await fetch(`${API_BASE_URL}/galleries?public_only=false`, {
                    headers: { 'Authorization': `Bearer ${authToken}` },
                });

                if (!response.ok) throw new Error('Failed to load galleries');

                galleries = await response.json();
                const select = document.getElementById('gallery');
                select.innerHTML = '<option value="">Select existing gallery...</option>';

                galleries.forEach(gallery => {
                    const option = document.createElement('option');
                    option.value = gallery.id;
                    option.textContent = `${gallery.name} (${gallery.photo_count || 0} photos)`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load galleries:', error);
            }
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            const uploadType = document.querySelector('input[name="uploadType"]:checked').value;

            if (uploadType === 'video' && files.length > 1) {
                showMessage('uploadMessage', 'Only one video can be uploaded at a time', 'error');
                return;
            }

            selectedFiles = files;
            renderFileList();
        }

        function renderFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="file-name">${file.name} (${formatFileSize(file.size)})</span>
                    <button type="button" class="file-remove" onclick="removeFile(${index})">Remove</button>
                `;
                fileList.appendChild(item);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        }

        async function handleUpload(e) {
            e.preventDefault();

            if (selectedFiles.length === 0) {
                showMessage('uploadMessage', 'Please select files to upload', 'error');
                return;
            }

            const uploadType = document.querySelector('input[name="uploadType"]:checked').value;

            if (uploadType === 'photo') {
                await uploadPhotos();
            } else {
                await uploadVideo();
            }
        }

        async function uploadPhotos() {
            const galleryMode = document.querySelector('input[name="galleryMode"]:checked').value;
            let galleryId;

            if (galleryMode === 'existing') {
                galleryId = document.getElementById('gallery').value;
                if (!galleryId) {
                    showMessage('uploadMessage', 'Please select a gallery', 'error');
                    return;
                }
            } else {
                const name = document.getElementById('newGalleryName').value;
                const slug = document.getElementById('newGallerySlug').value;
                const description = document.getElementById('newGalleryDescription').value;
                const isPublic = document.getElementById('newGalleryPublic').checked;

                if (!name || !slug) {
                    showMessage('uploadMessage', 'Please fill in gallery name and slug', 'error');
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/galleries`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ name, slug, description: description || null, is_public: isPublic }),
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.detail || 'Failed to create gallery');
                    }

                    const newGallery = await response.json();
                    galleryId = newGallery.id;
                    showMessage('uploadMessage', `Created gallery: ${name}`, 'success');
                    await loadGalleries();
                } catch (error) {
                    showMessage('uploadMessage', `Failed to create gallery: ${error.message}`, 'error');
                    return;
                }
            }

            const progressContainer = document.getElementById('progressContainer');
            const uploadBtn = document.getElementById('uploadBtn');
            progressContainer.style.display = 'block';
            uploadBtn.disabled = true;

            let uploaded = 0;
            for (const file of selectedFiles) {
                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch(`${API_BASE_URL}/galleries/${galleryId}/photos`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${authToken}` },
                        body: formData,
                    });

                    if (!response.ok) throw new Error('Upload failed');
                    uploaded++;
                    updateProgress(uploaded, selectedFiles.length);
                } catch (error) {
                    console.error('Upload error:', error);
                }
            }

            progressContainer.style.display = 'none';
            uploadBtn.disabled = false;
            selectedFiles = [];
            renderFileList();

            if (galleryMode === 'new') {
                document.getElementById('newGalleryName').value = '';
                document.getElementById('newGallerySlug').value = '';
                document.getElementById('newGalleryDescription').value = '';
                document.getElementById('newGalleryPublic').checked = true;
            }

            showMessage('uploadMessage', `Successfully uploaded ${uploaded} photo(s)!`, 'success');
        }

        async function uploadVideo() {
            const title = document.getElementById('videoTitle').value;
            const slug = document.getElementById('videoSlug').value;
            const description = document.getElementById('videoDescription').value;

            if (!title || !slug) {
                showMessage('uploadMessage', 'Please fill in title and slug', 'error');
                return;
            }

            const progressContainer = document.getElementById('progressContainer');
            const uploadBtn = document.getElementById('uploadBtn');
            progressContainer.style.display = 'block';
            uploadBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', selectedFiles[0]);
                formData.append('title', title);
                formData.append('slug', slug);
                formData.append('description', description);
                formData.append('is_public', 'true');

                const response = await fetch(`${API_BASE_URL}/videos`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData,
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Upload failed');
                }

                const video = await response.json();

                progressContainer.style.display = 'none';
                uploadBtn.disabled = false;
                selectedFiles = [];
                renderFileList();

                document.getElementById('videoTitle').value = '';
                document.getElementById('videoSlug').value = '';
                document.getElementById('videoDescription').value = '';

                showMessage('uploadMessage', `Video uploaded successfully! ID: ${video.id}`, 'success');
            } catch (error) {
                progressContainer.style.display = 'none';
                uploadBtn.disabled = false;
                showMessage('uploadMessage', `Upload failed: ${error.message}`, 'error');
            }
        }

        function updateProgress(current, total) {
            const percent = Math.round((current / total) * 100);
            const fill = document.getElementById('progressFill');
            fill.style.width = `${percent}%`;
            fill.textContent = `${percent}% (${current}/${total})`;
        }

        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = `message ${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function showLoginSection() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
        }

        function showUploadSection() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userInfo').textContent = 'Logged in successfully';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
    </script>
</body>
</html>
